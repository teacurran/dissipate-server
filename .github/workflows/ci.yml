name: Continuous Integration

on:
  push:
    branches:
      - main
      - beta
  pull_request:
    branches:
      - main
      - beta

# Cancel in-progress runs for the same branch/PR
# Include event_name to ensure push and pull_request runs never cancel each other
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: dissipate-server

jobs:
  preflight:
    name: Check optional secrets
    runs-on: ubuntu-latest
    outputs:
      docker_enabled: ${{ steps.check.outputs.docker_enabled }}
    steps:
      - id: check
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ]; then
            echo "Docker Hub credentials present; docker-build will run."
            echo "docker_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "Docker Hub credentials missing; docker-build will be skipped."
            echo "docker_enabled=false" >> "$GITHUB_OUTPUT"
          fi

  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    # The @QuarkusTest gRPC e2e tests boot the app against a real Postgres (Hibernate validate +
    # MyBatis migrations). Provide one as a service mapped to host port 5433 so it matches the
    # datasource in api/src/test/resources/application.properties (localhost:5433/dissipate_test).
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: dissipate
          POSTGRES_PASSWORD: dissipate
          POSTGRES_DB: dissipate_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U dissipate -d dissipate_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Compile backend
        working-directory: api
        run: ./mvnw -B compile -DskipTests -Dquarkus.quinoa=false

      - name: Apply database migrations (test env)
        working-directory: api
        run: ./mvnw -B -ntp -f ../api-db/pom.xml migration:up -Dmigration.env=test

      - name: Run unit tests
        working-directory: api
        run: ./mvnw -B verify -Dquarkus.quinoa=false

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [backend-build]

    # Re-runs the test suite for coverage, so it needs the same Postgres the tests boot against.
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: dissipate
          POSTGRES_PASSWORD: dissipate
          POSTGRES_DB: dissipate_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U dissipate -d dissipate_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarQube packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Apply database migrations (test env)
        working-directory: api
        run: ./mvnw -B -ntp -f ../api-db/pom.xml migration:up -Dmigration.env=test

      - name: Build, Test with Coverage, and SonarQube Scan
        working-directory: api
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:3.9.1.2184:sonar \
            -Dquarkus.quinoa=false \
            -DskipITs=false \
            -Dsonar.projectKey=dissipate-api \
            -Dsonar.host.url=https://sonar.villagecompute.com \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml,target/jacoco-report/jacoco.xml \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.java.source=21

      - name: Upload JaCoCo coverage reports
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: jacoco-coverage-reports
          path: |
            api/target/site/jacoco/
            api/target/jacoco-report/
          retention-days: 7

      - name: Add coverage summary to workflow
        if: always()
        run: |
          echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f api/target/site/jacoco/jacoco.csv ]; then
            echo "### Package Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Package | Instruction % | Branch % | Line % |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|---------------|----------|--------|" >> $GITHUB_STEP_SUMMARY
            tail -n +2 api/target/site/jacoco/jacoco.csv | while IFS=, read -r group package class inst_missed inst_covered branch_missed branch_covered line_missed line_covered rest; do
              if [ -n "$inst_covered" ] && [ -n "$inst_missed" ]; then
                inst_total=$((inst_missed + inst_covered))
                if [ $inst_total -gt 0 ]; then
                  inst_pct=$((inst_covered * 100 / inst_total))
                else
                  inst_pct=0
                fi

                branch_total=$((branch_missed + branch_covered))
                if [ $branch_total -gt 0 ]; then
                  branch_pct=$((branch_covered * 100 / branch_total))
                else
                  branch_pct="-"
                fi

                line_total=$((line_missed + line_covered))
                if [ $line_total -gt 0 ]; then
                  line_pct=$((line_covered * 100 / line_total))
                else
                  line_pct=0
                fi

                echo "| $package | ${inst_pct}% | ${branch_pct}% | ${line_pct}% |" >> $GITHUB_STEP_SUMMARY
              fi
            done
          else
            echo "No coverage data found" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Full HTML report available in **jacoco-coverage-reports** artifact" >> $GITHUB_STEP_SUMMARY

  docker-build:
    name: Build & Push Docker Image (Native)
    runs-on: ubuntu-latest
    needs: [backend-build, preflight]
    # Build on push (main/beta) and on PRs so deploy-pr.yml can resolve sha-<head_sha>.
    # The `secrets` context is NOT allowed in job-level `if:` expressions, so we
    # gate on the `preflight` job's docker_enabled output instead.
    if: (github.event_name == 'push' || github.event_name == 'pull_request') && needs.preflight.outputs.docker_enabled == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./api/src/main/docker/Dockerfile.native
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tags
        run: |
          echo "Docker image built and pushed:"
          echo "${{ steps.meta.outputs.tags }}"
