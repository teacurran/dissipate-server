# SonarQube configuration (self-hosted)
sonar.projectKey=dissipate-server
sonar.host.url=https://sonar.villagecompute.com

# Project info
sonar.projectName=dissipate-server

# Source directories (api/ is the Quarkus module; api-db/ holds migrations + DB tooling)
sonar.sources=api/src/main/java,api-db/src/main/java
sonar.tests=api/src/test/java

# Encoding
sonar.sourceEncoding=UTF-8

# Java configuration
sonar.java.source=21
sonar.java.binaries=api/target/classes,api-db/target/classes
sonar.java.test.binaries=api/target/test-classes

# JaCoCo coverage report location (check both Maven plugin and Quarkus locations)
sonar.coverage.jacoco.xmlReportPaths=api/target/site/jacoco/jacoco.xml,api/target/jacoco-report/jacoco.xml

# Exclusions - generated code and configuration
sonar.exclusions=**/target/**,**/node_modules/**,**/*.min.js,**/*.min.css,**/generated-sources/**,**/.quinoa/**,**/.quarkus/**

# Test exclusions
sonar.test.exclusions=**/test/**
