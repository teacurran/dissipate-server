## MyBatis Migrations environment for the docker-compose network.
## Used by the `main-db-migrations` service (mvn ... -Dmigration.env=docker).
## Targets the `main-db` service by its compose hostname, not the host port.

## Base time zone to ensure times are consistent across machines
time_zone=GMT+0:00

## JDBC connection properties.
driver=org.postgresql.Driver
url=jdbc:postgresql://main-db:5432/dissipate
username=dissipate
password=dissipate

# Send the entire script at once (matches development.properties; needed for
# multi-statement scripts like the baseline).
send_full_script=true
delimiter=;
full_line_delimiter=false
auto_commit=false
ignore_warnings=true

# Name of the table that tracks applied migrations.
changelog=CHANGELOG
