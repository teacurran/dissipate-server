# Tests run against a dedicated, freshly-migrated database (dissipate_test) on the local Postgres,
# so Hibernate's validate strategy matches the current entities. Provision it with:
#   docker exec <main-db> psql -U dissipate -d postgres -c 'CREATE DATABASE dissipate_test;'
#   (cd api && ./mvnw -f ../api-db/pom.xml migration:up -Dmigration.env=test)
quarkus.datasource.reactive.url=vertx-reactive:postgresql://localhost:5433/dissipate_test
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/dissipate_test

# The gRPC auth pipeline (custom interceptor + PrincipalResolver) supersedes OIDC/Keycloak for
# client auth, so disable OIDC in tests — otherwise every request blocks trying to reach Keycloak.
quarkus.oidc.enabled=false

# Don't let quarkus-jacoco emit its own report into target/site/jacoco; the jacoco-maven-plugin
# owns that location and reports on the merged (plain JUnit + @QuarkusTest) exec. Quarkus still
# writes its exec (target/jacoco-quarkus.exec) which the merge step picks up.
quarkus.jacoco.report=false

# gRPC test clients. With quarkus.grpc.server.use-separate-server=false the gRPC server shares the
# unified HTTP server, so clients target the HTTP test port over plaintext h2c.
quarkus.grpc.clients.session.host=localhost
quarkus.grpc.clients.session.port=${quarkus.http.test-port:8081}
quarkus.grpc.clients.session.plain-text=true
quarkus.grpc.clients.account.host=localhost
quarkus.grpc.clients.account.port=${quarkus.http.test-port:8081}
quarkus.grpc.clients.account.plain-text=true
quarkus.grpc.clients.identity.host=localhost
quarkus.grpc.clients.identity.port=${quarkus.http.test-port:8081}
quarkus.grpc.clients.identity.plain-text=true
quarkus.grpc.clients.chat.host=localhost
quarkus.grpc.clients.chat.port=${quarkus.http.test-port:8081}
quarkus.grpc.clients.chat.plain-text=true
