quarkus.application.name=dissipate
quarkus.log.level=INFO

# ============================================================================
# Snowflake ID generation
# ----------------------------------------------------------------------------
# Region identifies the deployment region in the Snowflake bit layout (5 bits,
# 0-31). Distinct regions guarantee distinct IDs across geographies even if
# instance numbers happen to collide.
# ============================================================================
dissipate.region=0
quarkus.shutdown.timeout=10s
quarkus.datasource.reactive=true
quarkus.datasource.db-kind=postgresql
# Dev points at the docker-compose `main-db` (postgis) published on host port 5433.
quarkus.datasource.reactive.url=vertx-reactive:postgresql://localhost:5433/dissipate
# A JDBC URL is also required: quarkus-jdbc-postgresql is on the classpath and,
# since Quarkus 3.x auto-deactivates a datasource whose URL is unset, the
# (blocking) persistence unit fails to resolve the default datasource without it.
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/dissipate
quarkus.datasource.username=dissipate
quarkus.datasource.password=dissipate

# quarkus.datasource.readdb.reactive=true
# quarkus.datasource.readdb.db-kind=postgresql
# quarkus.datasource.readdb.reactive.url=vertx-reactive:postgresql://localhost:5432/dissipate
# quarkus.datasource.readdb.username=tea
# quarkus.datasource.readdb.password=

quarkus.grpc.server.use-separate-server=false

# OIDC / Keycloak
quarkus.oidc.auth-server-url=http://localhost:8180/realms/dissipate
quarkus.oidc.client-id=dissipate-app
quarkus.oidc.application-type=service
quarkus.oidc.token.issuer=any
quarkus.oidc.roles.role-claim-path=realm_access/roles
quarkus.oidc.connection-delay=30S
# quarkus.grpc.clients.dissipate.host=localhost
# quarkus.grpc.clients.dissipate.port=9001
quarkus.generate-code.grpc.descriptor-set.generate=true
quarkus.generate-code.grpc.scan-for-imports=all
quarkus.generate-code.grpc.scan-for-proto=build.buf:protovalidate

# JDBC OpenTelemetry instrumentation is temporarily disabled: the pinned
# io.opentelemetry.instrumentation:opentelemetry-jdbc:2.12.0-alpha is binary-
# incompatible with the OTel API bundled in Quarkus 3.36 (NoSuchMethodError on
# SqlClientAttributesExtractorBuilder.setStatementSanitizationEnabled). The app
# runs reactively (reactive-pg-client) so DB spans still flow via that path.
# TODO: reconcile the opentelemetry-jdbc version with the Quarkus 3.36 OTel BOM,
# then re-enable. The blocking JDBC datasource itself is only needed to satisfy
# the default persistence unit's datasource resolution.
quarkus.datasource.jdbc.telemetry=false
# quarkus.datasource.jdbc.driver=io.opentelemetry.instrumentation.jdbc.OpenTelemetryDriver

# Migrations (MyBatis, in the api-db module) are authoritative. Hibernate must
# only validate the schema against the entities, never mutate it. Run
# `mvn -f api-db/pom.xml migration:up` before booting.
quarkus.hibernate-orm.schema-management.strategy=validate
# quarkus.hibernate-orm.physical-naming-strategy=app.dissipate.data.jpa.ModelNamingStrategy
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
# quarkus.hibernate-orm.log.sql=true

# open telemetry
# quarkus.otel.exporter.otlp.headers=Authorization=Bearer my_secret
#quarkus.otel.exporter.otlp.endpoint=http://jaeger:4317
quarkus.otel.exporter.otlp.traces.endpoint=http://localhost:4317
# quarkus.otel.traces.exporter=otlp
# quarkus.otel.exporter.otlp.traces.timeout=10
quarkus.log.console.format=%d{HH:mm:ss} %-5p traceId=%X{traceId}, parentId=%X{parentId}, spanId=%X{spanId}, sampled=%X{sampled} [%c{2.}] (%t) %s%e%n\n

# quarkus.log.level=DEBUG
quarkus.log.category."app.dissipate".level=DEBUG
quarkus.log.category."io.opentelemetry".level=DEBUG


# ============================================================================
# Delayed job / outbox configuration
# OTP delivery (and other side-effects) flow through delayed_jobs so they run
# outside the originating gRPC transaction. Tune attempts/from address here.
# ============================================================================
dissipate.delayed-job.max-attempts=3
dissipate.email-auth.from=admin@hallofjustice.net

quarkus.mailer.mock=false
quarkus.mailer.host=127.0.0.1
quarkus.mailer.port=1025
quarkus.tls.trust-all=true
quarkus.mailer.tls=false
quarkus.mailer.start-tls=DISABLED
quarkus.mailpit.http.server=http://localhost:8025

quarkus.jacoco.report-location=target/site/jacoco

# Quinoa / Vue webui config removed — the frontend is moving to a dedicated
# `admin` module. See src/main/webui (to be relocated).

quarkus.websockets-next.server.auto-ping-interval=30s

# ============================================================================
# PII at-rest encryption key (AES-GCM, used by EncryptedStringConverter)
# Provision via environment variable DISSIPATE_PII_KEY in deployed envs.
# Should be a high-entropy secret (e.g. base64 of 32 random bytes from
# `openssl rand -base64 32`). Rotating this without re-encrypting existing
# rows will break decryption of older records.
# ============================================================================
dissipate.pii.key=CHANGE_ME_dev_only_pii_key_do_not_use_in_prod
%prod.dissipate.pii.key=${DISSIPATE_PII_KEY}

quarkus.native.resources.includes=locales/**,templates/**/*
quarkus.shutdown.delay.enabled=true
quarkus.shutdown.delay=10s

# ============================================================================
# Production profile (%prod)
# Most production config (DB URL, Keycloak URL, S3, etc.) is passed via
# environment variables from Kubernetes ConfigMap/Secret.
# ============================================================================
%prod.quarkus.hibernate-orm.schema-management.strategy=validate
%prod.quarkus.mailer.mock=false
%prod.quarkus.log.level=INFO
%prod.quarkus.log.category."app.dissipate".level=INFO
%prod.quarkus.log.category."io.opentelemetry".level=WARN
%prod.quarkus.tls.trust-all=false
